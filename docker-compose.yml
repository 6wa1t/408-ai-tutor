services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./images:/app/images
      - ./logs:/app/logs
      - ./question_banks:/app/question_banks
      - ./exports:/app/exports
    environment:
      - DEBUG=${DEBUG:-false}
      - PYTHONUTF8=1
      - PYTHONIOENCODING=utf-8
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - VISION_API_KEY=${VISION_API_KEY:-}
      - VISION_API_BASE=${VISION_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - VISION_MODEL=${VISION_MODEL:-qwen-vl-max}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/app_questions.db}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_BASE_URL=http://backend:8000
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
